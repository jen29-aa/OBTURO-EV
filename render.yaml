services:
  - type: web
    name: obturo-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "daphne obturo_backend.asgi:application --port $PORT --bind 0.0.0.0"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: obturo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: obturo-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "obturo-backend.onrender.com"

  - type: redis
    name: obturo-redis
    ipAllowList: []
    plan: free

databases:
  - name: obturo-db
    databaseName: obturo
    user: obturo
    plan: free
